<main class="main-container stock-page">
    <section class="stock-section">
        <div class="stock-list-header">
            <div>
                <h2>국내주식 보유</h2>
                <div class="stock-summary" id="stock-summary"></div>
            </div>
            <div class="stock-actions stock-header-actions">
                <form id="stock-data-generate-form" class="stock-generate-form">
                    <label>
                        기준일
                        <input name="proc_date" type="date" required>
                    </label>
                    <div class="stock-generate-buttons">
                        <button type="button" id="stock-item-generate-button">종목데이터생성</button>
                        <button type="submit">보유데이터생성</button>
                    </div>
                </form>
                <a href="/asset/stck/add" class="stock-add-link" data-link>주식매매관리</a>
            </div>
        </div>
        <p id="stock-generate-status" class="stock-status" hidden></p>
        <div class="stock-table-wrap">
            <table class="common-table stock-table stock-holding-table">
                <thead>
                    <tr>
                        <th>기준일</th>
                        <th>종목명</th>
                        <th>보유수량</th>
                        <th>취득액</th>
                        <th>평가액</th>
                        <th>평가손익</th>
                        <th>수익률</th>
                    </tr>
                </thead>
                <tbody id="stock-list"></tbody>
            </table>
        </div>
    </section>
</main>
