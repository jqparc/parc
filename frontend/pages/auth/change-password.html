<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Parc</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
        
    <div id="nav-placeholder"></div>

    <main class="container">
        <h2>비밀번호 변경 🔐</h2>
        <p>안전을 위해 현재 비밀번호를 확인한 후 새로운 비밀번호를 설정합니다.</p>

        <div class="form-group">
            <label for="current_password">현재 비밀번호</label>
            <input type="password" id="current_password" placeholder="현재 사용 중인 비밀번호 입력">
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">

        <div class="form-group">
            <label for="new_password">새 비밀번호</label>
            <input type="password" id="new_password" placeholder="새로운 비밀번호 입력">
        </div>

        <div class="form-group">
            <label for="confirm_password">새 비밀번호 확인</label>
            <input type="password" id="confirm_password" placeholder="새로운 비밀번호 다시 입력">
        </div>

        <button id="change-pw-btn">비밀번호 변경하기</button>
        <button type="button" onclick="history.back()" style="background-color: #6c757d; margin-top: 10px;">취소</button>
    </main>


    <div id="footer-placeholder"></div>

    <script type="module" src="/js/auth/change-password.js"></script>
    <script type="module" src="/js/auth/signup.js"></script>
    <script type="module" src="/js/load_layout.js"></script>
</body>
</html>
