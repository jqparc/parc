            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호 입력">
        </div>
        <button id="login-btn">로그인하기</button>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="/js/load_layout.js"></script>

    </body>
