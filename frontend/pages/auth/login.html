<!-- frontend/pages/auth/login.html -->
<!-- 주의: 이 파일은 router.js에 의해 동적으로 로드되는 조각(Fragment)이므로 html, head, body 태그를 사용하지 않습니다. -->

<div class="login-container">
    <h2>로그인 🔑</h2>
    <p>다시 오신 것을 환영합니다!</p>

    <!-- JS에서 이벤트를 쉽게 잡고, Enter키 입력을 지원하기 위해 form 태그로 감쌉니다. -->
    <form id="login-form">
        <div class="form-group">
            <label for="user_id">이메일(아이디)</label>
            <!-- 브라우저 자동완성을 돕기 위해 name 속성과 type="email"을 권장합니다. -->
            <input type="text" id="user_id" name="user_id" placeholder="이메일 입력" required>
        </div>
        
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
        </div>
        
        <!-- form 내부의 button은 기본적으로 type="submit"으로 동작합니다. -->
        <button type="submit" id="login-btn">로그인하기</button>
    </form>
</div>
