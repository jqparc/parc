<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Parc</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
        
    <div id="nav-placeholder"></div>

    <main class="container">
        <h2>내 정보 수정 🛠️</h2>
        <p>수정할 정보를 입력한 뒤 저장해주세요.</p>

        <div class="form-group">
            <label for="user_id">아이디</label>
            <input type="text" id="user_id" readonly disabled>
        </div>

        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" placeholder="새로운 닉네임 입력">
        </div>

        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="tel" id="phone" placeholder="010-1234-5678">
        </div>

        <button id="update-btn">저장하기</button>
    </main>
    <div id="footer-placeholder"></div>

    <script type="module" src="/js/auth/profile.js"></script>
    <script type="module" src="/js/auth/signup.js"></script>
    <script type="module" src="/js/load_layout.js"></script>
</body>
</html>
