<section class="post-detail-page">
    <div class="post-detail-header">
        <div>
            <p class="post-detail-kicker" id="post-detail-board">Board</p>
            <h2 id="post-detail-title">게시글</h2>
        </div>
        <a href="/economy/infos" class="post-detail-back" id="post-detail-back" data-link>목록</a>
    </div>

    <article class="post-detail-view" id="post-detail-view">
        <div class="post-detail-meta">
            <span id="post-detail-date"></span>
            <span id="post-detail-views"></span>
        </div>
        <div class="post-detail-content" id="post-detail-content"></div>
    </article>

    <p id="post-detail-error" class="post-write-error" hidden></p>

    <div class="post-detail-actions">
        <button type="button" class="post-write-secondary" id="post-delete-btn">삭제</button>
        <button type="button" class="post-write-primary" id="post-edit-btn">수정</button>
    </div>
</section>
