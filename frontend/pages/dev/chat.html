<link rel="stylesheet" href="/css/gpt-chat.css">

<section class="gpt-page">
    <header class="gpt-header">
        <div>
            <p class="gpt-kicker">Gemini 경제 분석</p>
            <h2>경제 뉴스 AI 비서</h2>
        </div>
    </header>

    <section id="gpt-messages" class="gpt-messages" aria-live="polite"></section>

    <form id="gpt-form" class="gpt-form">
        <textarea
            id="gpt-input"
            rows="1"
            placeholder="경제 뉴스, 금리, 환율, 증시 흐름에 대해 물어보세요"
            aria-label="Gemini에게 보낼 메시지"
            required
        ></textarea>
        <button id="gpt-send-button" type="submit">전송</button>
    </form>
</section>
