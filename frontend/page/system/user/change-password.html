<main class="main-container password-change-container">
    <h2>비밀번호 변경</h2>

    <div class="form-group">
        <label for="new_password">새 비밀번호</label>
        <input type="password" id="new_password" autocomplete="new-password" placeholder="새 비밀번호">
    </div>

    <div class="form-group">
        <label for="confirm_password">비밀번호 확인</label>
        <input type="password" id="confirm_password" autocomplete="new-password" placeholder="새 비밀번호 다시 입력">
    </div>

    <p id="change-password-error" class="password-modal-error" hidden></p>

    <button id="change-pw-btn">비밀번호 변경하기</button>
    <button type="button" id="change-pw-cancel">취소</button>
</main>
