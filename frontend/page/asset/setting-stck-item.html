<main class="main-container stock-page asset-setting-page">
    <section class="stock-section asset-setting-section">
        <div class="stock-list-header">
            <div>
                <h2>국내주식 종목관리</h2>
                <div class="stock-summary" id="setting-stock-item-summary"></div>
            </div>
            <div class="stock-actions">
                <a href="/asset/setting" class="stock-back-link" data-link>설정</a>
            </div>
        </div>

        <form id="setting-stock-item-search-form" class="asset-setting-search-panel">
            <label>
                From
                <input name="from_date" type="date">
            </label>
            <label>
                To
                <input name="to_date" type="date">
            </label>
            <label>
                종목코드
                <input name="itms_code" type="text" value="전체" placeholder="전체">
            </label>
            <button type="submit">조회</button>
        </form>

        <p id="setting-stock-item-error" class="stock-error" hidden></p>

        <div class="asset-setting-table-toolbar">
            <button type="button" id="setting-stock-item-save-button" disabled>저장</button>
        </div>

        <div class="stock-table-wrap">
            <table class="common-table stock-table asset-setting-stock-item-table">
                <thead>
                    <tr>
                        <th>일자</th>
                        <th>종목코드</th>
                        <th>종목명</th>
                        <th>시장구분</th>
                        <th>시장명</th>
                        <th>업종구분</th>
                        <th>업종명</th>
                        <th>종가</th>
                        <th>생성일</th>
                        <th>수정일</th>
                    </tr>
                </thead>
                <tbody id="setting-stock-item-list"></tbody>
            </table>
        </div>
    </section>
</main>
